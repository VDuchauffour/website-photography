{{ define "main" }}
{{ $allImages := slice }}
{{ range where .Site.RegularPages "Section" "series" }}
  {{ range .Params.images }}
    {{ $allImages = $allImages | append . }}
  {{ end }}
{{ end }}
<section class="carousel">
  <div class="carousel-track">
    {{ range shuffle $allImages }}
      <div class="carousel-slide">
        <img src="{{ .src }}" alt="{{ .alt }}" loading="eager">
      </div>
    {{ end }}
  </div>
  <button class="carousel-arrow carousel-arrow--prev" aria-label="Previous image">&#8249;</button>
  <button class="carousel-arrow carousel-arrow--next" aria-label="Next image">&#8250;</button>
</section>

<script>
(function() {
  var slides = document.querySelectorAll('.carousel-slide');
  var current = 0;
  var timer;
  slides[0].classList.add('is-active');
  if (slides.length < 2) return;

  function go(dir) {
    var prev = current;
    current = (current + dir + slides.length) % slides.length;
    var out = slides[prev];
    var into = slides[current];
    if (dir > 0) {
      out.classList.add('slide-out-left');
      into.classList.add('slide-in-right', 'is-active');
    } else {
      out.classList.add('slide-out-right');
      into.classList.add('slide-in-left', 'is-active');
    }
    setTimeout(function() {
      out.classList.remove('is-active', 'slide-out-left', 'slide-out-right');
      into.classList.remove('slide-in-right', 'slide-in-left');
    }, 600);
  }

  function start() { timer = setInterval(function() { go(1); }, 3000); }
  function reset() { clearInterval(timer); start(); }

  document.querySelector('.carousel-arrow--prev').addEventListener('click', function() { go(-1); reset(); });
  document.querySelector('.carousel-arrow--next').addEventListener('click', function() { go(1); reset(); });
  start();
})();
</script>
{{ end }}
