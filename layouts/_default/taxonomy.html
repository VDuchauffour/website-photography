{{ define "main" }}
<section class="series-list-page">
  <div class="series-list-header">
    <h1 class="page-title">{{ .Title }}</h1>
  </div>
  <div class="series-list-grid">
    {{ range .Pages }}
      <a href="{{ .RelPermalink }}" class="series-list-item">
        <div class="series-list-img">
          {{ with .Params.coverImage }}
            <img src="{{ . }}" alt="{{ $.Title }}" loading="lazy">
          {{ end }}
        </div>
        <div class="series-list-meta">
          <h2 class="series-list-title">{{ .Title }}</h2>
        </div>
      </a>
    {{ end }}
  </div>
</section>
{{ end }}
